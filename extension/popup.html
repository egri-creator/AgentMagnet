<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AgentMagnet</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #f8f7ff;
      color: #1a1a1a;
    }
    h1 {
      font-size: 18px;
      color: #6c5ce7;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin: 8px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 24px; font-weight: bold; color: #6c5ce7; }
    .badge {
      display: inline-block;
      background: #6c5ce7;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #6c5ce7;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      text-align: center;
      text-decoration: none;
    }
    .btn:hover { background: #5a4bd1; }
    .btn.secondary { background: #dfe6e9; color: #2d3436; }
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #dfe6e9;
      border-radius: 10px;
      font-size: 14px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    .result-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .result-item:last-child { border-bottom: none; }
    .price { font-weight: bold; color: #00b894; }
    .store { color: #636e72; font-size: 12px; }
  </style>
</head>
<body>
  <h1>⚡ AgentMagnet</h1>
  <div id="status">
    <div class="stat">
      <div class="stat-label">Agents conectados</div>
      <div class="stat-value" id="agent-count">---</div>
    </div>
    <div class="stat">
      <div class="stat-label">Productos buscados hoy</div>
      <div class="stat-value" id="search-count">---</div>
    </div>
  </div>

  <input type="text" id="search-input" placeholder="Buscar producto... (ej: MacBook Pro)">
  <button class="btn" id="search-btn">🔍 Buscar</button>

  <div id="results" style="margin-top: 12px;"></div>

  <a href="https://agentmagnet-y07b.onrender.com/dashboard" target="_blank" class="btn secondary" style="margin-top:12px;">📊 Dashboard completo</a>

  <script src="popup.js"></script>
</body>
</html>
